<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Lista de Tarefas Moderna</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo">
                    <i data-lucide="check-square" class="logo-icon"></i>
                    <span>Eder News Task</span>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html" class="active"><i data-lucide="list-todo"></i> Tarefas</a></li>
                    <li><a href="analises.html"><i data-lucide="bar-chart-2"></i> Análises</a></li>
                    <li><a href="calendario.html"><i data-lucide="calendar"></i> Calendário</a></li>
                </ul>
                <div style="display: flex; align-items: center;">
                    <div class="user-profile">
                        <i data-lucide="user"></i>
                        <span id="user-display-name">Carregando...</span>
                    </div>
                    <button class="btn-exit">
                        <i data-lucide="log-out"></i> Sair
                    </button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <!-- Header Section -->
            <header class="page-header">
                <div class="header-info">
                    <h1><i data-lucide="sparkles" style="color: var(--primary); margin-right: 0.5rem;"></i>Minhas Tarefas</h1>
                    <p id="current-date">Segunda-feira, 12 de Maio</p>
                </div>
                <!-- Progress Bar -->
                <div class="progress-section">
                    <div class="progress-info">
                        <span>Progresso Geral</span>
                        <span id="progress-percentage">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </header>

            <!-- Task Form -->
            <section class="task-form-card">
                <form id="task-form">
                    <div class="form-row main-row">
                        <input type="text" id="task-title" placeholder="O que precisa ser feito?" required>
                        <button type="submit" class="btn-add">
                            <i data-lucide="plus"></i> Adicionar
                        </button>
                    </div>
                    <div class="form-row secondary-row">
                        <div class="input-group">
                            <i data-lucide="tag"></i>
                            <select id="task-category">
                                <option value="Pessoal">Pessoal</option>
                                <option value="Trabalho">Trabalho</option>
                                <option value="Estudos">Estudos</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <i data-lucide="flag"></i>
                            <select id="task-priority">
                                <option value="Baixa">Baixa</option>
                                <option value="Média">Média</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <i data-lucide="calendar"></i>
                            <input type="date" id="task-date">
                        </div>
                    </div>
                </form>
            </section>

            <!-- Filters -->
            <section class="filters-container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="Todas"><i data-lucide="layout-list"></i> Todas</button>
                    <button class="filter-btn" data-filter="Pendentes"><i data-lucide="circle"></i> Pendentes</button>
                    <button class="filter-btn" data-filter="Concluídas"><i data-lucide="check-circle-2"></i> Concluídas</button>
                </div>
                <div class="task-count">
                    Exibindo <span id="visible-tasks-count">0</span> tarefas
                </div>
            </section>

            <!-- Task List -->
            <section id="task-list" class="task-list">
                <!-- Tasks will be injected here -->
                <div class="empty-state">
                    <i data-lucide="clipboard-list"></i>
                    <p>Nenhuma tarefa encontrada. Comece adicionando uma!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Supabase Config & Client -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Set today's date in the header
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('pt-BR', options);
    </script>
</body>
</html>
